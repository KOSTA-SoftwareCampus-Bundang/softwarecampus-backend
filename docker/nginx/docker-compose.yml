# ==============================================================================
# [DEPRECATED] Nginx Docker Compose Configuration
#
# 더 이상 사용하지 않습니다. 히스토리 및 설정 백업 목적으로 보관합니다.
#
# 변경 이유 (2026-03-20):
#   - 인프라가 AWS EC2 → NAS 온프레미스 + Cloudflare Tunnel로 전환됨
#   - SSL은 Cloudflare에서 처리 (Certbot 불필요)
#   - /api, /admin → backend, / → frontend 라우팅은
#     Cloudflare Tunnel 대시보드 ingress 규칙으로 대체됨
#   - 외부 Nginx 리버스프록시 컨테이너 역할 없음
# ==============================================================================
# [Nginx Docker Compose Configuration] (원본 보관)
#
# 목적: 프론트엔드와 백엔드를 연결하는 리버스 프록시 서버 실행
# 실행: docker compose up -d
# ==============================================================================
services:
  # --------------------------------------------------------------------------
  # Nginx Reverse Proxy
  # 80/443번 포트로 들어오는 요청을 처리합니다.
  # --------------------------------------------------------------------------
  softcampus-nginx:
    image: nginx:latest
    container_name: softcampus-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    networks:
      - softcampus-network
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  # --------------------------------------------------------------------------
  # Certbot (SSL Certificate Automation)
  # Let's Encrypt 인증서를 발급하고 갱신합니다.
  # --------------------------------------------------------------------------
  softcampus-certbot:
    image: certbot/certbot
    container_name: softcampus-certbot
    restart: unless-stopped
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

# --------------------------------------------------------------------------
# Network Configuration
# --------------------------------------------------------------------------
networks:
  softcampus-network:
    external: true
