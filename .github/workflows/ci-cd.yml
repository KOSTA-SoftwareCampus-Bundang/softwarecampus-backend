# ==============================================================================
# [GitHub Actions - Backend CI/CD 워크플로우]
#
# 목적: Spring Boot 백엔드 애플리케이션의 빌드, Docker 이미지 생성, NAS 배포 자동화
# 트리거: main 브랜치에 푸시 또는 PR 발생 시
# 주요 기능:
#   - Java 17 & Maven 빌드
#   - GHCR(GitHub Container Registry) 이미지 푸시
#   - NAS 서버로 설정 파일 전송 및 Docker Compose 배포
#
# 변경 이유 (2026-03-20):
#   - 인프라가 AWS EC2 → NAS 온프레미스 + Cloudflare Tunnel로 전환
#   - 외부 Nginx 제거 → Cloudflare Tunnel이 직접 프론트엔드 컨테이너로 연결
#   - /api, /admin 라우팅은 프론트엔드 컨테이너 내부 Nginx가 백엔드로 프록시
# ==============================================================================
name: Backend CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# --------------------------------------------------------------------------
# 전역 환경 변수 설정
# --------------------------------------------------------------------------
env:
  # Synology NAS 경로 분리:
  #   SSH shell → /volume1/docker/... (실제 파일시스템 경로)
  #   SCP(SFTP) → /docker/...        (공유 폴더 기준 가상 루트, /volume1 없음)
  # secrets.DEPLOY_BASE_PATH     예: /volume1/docker/softwarecampus  (SSH용)
  # secrets.DEPLOY_BASE_PATH_SCP 예: /docker/softwarecampus          (SCP용)
  DEPLOY_PATH:     "${{ secrets.DEPLOY_BASE_PATH }}/softwarecampus-backend"
  SCP_DEPLOY_PATH: "${{ secrets.DEPLOY_BASE_PATH_SCP }}/softwarecampus-backend"
  # Docker 네트워크 및 컨테이너 설정
  NETWORK_NAME: "softcampus-network"
  # 리소스 경로 (Repository 내)
  COMPOSE_FILE_PATH: "docker/backend/docker-compose.yml"

# --------------------------------------------------------------------------
# 권한 설정
# GHCR 패키지 쓰기 권한(packages: write) 필수
# --------------------------------------------------------------------------
permissions:
  contents: read
  packages: write

jobs:
  # ==========================================================================
  # [Job 1] Build
  # 애플리케이션을 컴파일하고 테스트하여 JAR 파일을 생성합니다.
  # ==========================================================================

  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 소스 코드 체크아웃
    - name: Checkout code
      uses: actions/checkout@v4
    
    # 2. JDK 17 설정 (Temurin 배포판)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
        cache-dependency-path: 'pom.xml'

    # 3. Maven Wrapper 실행 권한 부여
    - name: Grant execute permission for mvnw
      run: chmod +x mvnw

    # 4. Maven 빌드 (테스트 제외 - 속도 최적화)
    # 실제 운영 시에는 테스트를 포함하는 것이 좋습니다.
    - name: Build with Maven
      run: ./mvnw clean package -DskipTests

    # 5. 빌드된 JAR 파일 업로드 (다음 Job으로 전달)
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: backend-jar
        path: target/*.jar
        retention-days: 1

  # ==========================================================================
  # [Job 2] Push
  # 빌드된 아티팩트로 Docker 이미지를 생성하고 GHCR에 푸시합니다.
  # ==========================================================================
  push:
    needs: build
    # main 브랜치 푸시 이벤트일 때만 실행 (PR 제외)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
    # 1. 소스 코드 체크아웃 (Dockerfile 참조용)
    - uses: actions/checkout@v4

    # 2. 빌드 아티팩트(JAR) 다운로드
    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: backend-jar
        path: target

    # 3. GHCR 로그인
    - name: Log in to the Container registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # 4. Docker 메타데이터 추출 (태그 생성)
    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}/backend
        tags: |
          type=raw,value=latest
          type=sha,format=short

    # 5. Docker 이미지 빌드 및 푸시
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/backend/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

  # ==========================================================================
  # [Job 3] Deploy
  # Cloudflare Zero Trust SSH Tunnel을 통해 NAS에 접속하여 배포합니다.
  # ==========================================================================
  deploy:
    needs: push
    runs-on: ubuntu-latest
    env:
      # Cloudflare Zero Trust SSH 인증 (Service Token)
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
    steps:
      # 1. 소스 코드 체크아웃 (docker-compose 파일 전송용)
      - uses: actions/checkout@v4

      # 2. cloudflared 설치
      # Cloudflare Zero Trust SSH Tunnel ProxyCommand에 필요
      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb \
            -o cloudflared.deb
          sudo dpkg -i cloudflared.deb

      # 3. SSH 설정
      # ~/.ssh/config에 cloudflared ProxyCommand 등록
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config << EOF
          Host ${{ secrets.EC2_HOST }}
            ProxyCommand cloudflared access ssh --hostname %h --id ${{ secrets.CF_ACCESS_CLIENT_ID }} --secret ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF

      # 4. 배포 파일 준비 (로컬 러너)
      # .env는 민감 정보 포함 → 로컬에서 생성 후 SCP 전송 (heredoc 중첩 회피)
      - name: Prepare deployment files
        env:
          BACKEND_ENV: ${{ secrets.BACKEND_ENV }}
        run: |
          mkdir -p /tmp/deploy/backend
          cp ${{ env.COMPOSE_FILE_PATH }} /tmp/deploy/backend/
          REPO_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          {
            printf '%s\n' "$BACKEND_ENV"
            echo "NETWORK_NAME=${{ env.NETWORK_NAME }}"
            echo "DOCKER_IMAGE_NAME=ghcr.io/$REPO_NAME/backend:latest"
          } > /tmp/deploy/backend/.env

      # 5. NAS로 파일 전송 (SCP)
      # SSH로 디렉토리를 먼저 생성(실제 경로)한 뒤, SCP는 SFTP 가상 경로로 전송
      - name: Copy files to server
        run: |
          ssh ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} \
            "mkdir -p ${{ env.DEPLOY_PATH }}"
          scp /tmp/deploy/backend/docker-compose.yml \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:${{ env.SCP_DEPLOY_PATH }}/
          scp /tmp/deploy/backend/.env \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:${{ env.SCP_DEPLOY_PATH }}/

      # 6. NAS에서 배포 실행 (SSH)
      - name: Deploy on server
        run: |
          ssh ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} << ENDSSH
          set -e
          DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
          NETWORK_NAME="${{ env.NETWORK_NAME }}"

          chmod 600 \$DEPLOY_PATH/.env

          # ------------------------------------------------------------------
          # Step 2: Docker 네트워크 확인
          # ------------------------------------------------------------------
          echo "Checking Docker network..."
          docker network create \$NETWORK_NAME || true

          # ------------------------------------------------------------------
          # Step 3: GHCR 로그인
          # ------------------------------------------------------------------
          echo "Logging into GHCR..."
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

          # ------------------------------------------------------------------
          # Step 4: Backend 서비스 배포
          # ------------------------------------------------------------------
          echo "Deploying Backend..."
          cd \$DEPLOY_PATH
          docker compose pull || true
          docker compose up -d

          # ------------------------------------------------------------------
          # Step 5: 정리
          # ------------------------------------------------------------------
          docker image prune -f
          ENDSSH
